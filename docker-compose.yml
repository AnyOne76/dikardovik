services:
  kadrovik-app:
    container_name: kadrovik-app
    build:
      context: .
      args:
        NEXTAUTH_URL: http://localhost:25531
    ports:
      - "25531:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/prod.db
      # Подставьте публичный URL, с которого заходят в браузере (LAN/IP или домен). Переопределяется из .env при необходимости.
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:25531}
      AUTH_TRUST_HOST: "true"
    volumes:
      - kadrovik-data:/app/data
    restart: unless-stopped

volumes:
  kadrovik-data:
